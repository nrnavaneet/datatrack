name: Datatrack CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * 1" # Mondays 12:00 UTC — weekly health check on main

concurrency:
  group: datatrack-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run CLI smoke test
        run: |
          datatrack init || true

      - name: Pre-Commit test
        run: |
          pip install pre-commit
          pre-commit run --all-files

      - name: Run unit tests
        run: pytest -q tests/
